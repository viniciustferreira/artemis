name: Daily lunar email (Neon)

on:
  schedule:
    # Run at 18:30 and 19:30 UTC so local 20:30 Europe/Stockholm proceeds (handles DST)
    - cron: "30 18,19 * * *"
  workflow_dispatch: {}

jobs:
  daily_email:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      SMTP_ADDRESS: ${{ secrets.SMTP_ADDRESS }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_DOMAIN: ${{ secrets.SMTP_DOMAIN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_AUTHENTICATION: ${{ secrets.SMTP_AUTHENTICATION }}
      APP_HOST: ${{ secrets.APP_HOST }}
      DAILY_LUNAR_API_URL: ${{ secrets.DAILY_LUNAR_API_URL }}
      ASTRO_API_KEY: ${{ secrets.ASTRO_API_KEY }}
      REDIS_URL: ${{ secrets.REDIS_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev build-essential

      - name: Install gems
        run: |
          bundle config set without 'development test' || true
          bundle install --jobs 4 --retry 3

      - name: Check local time (Europe/Stockholm)
        id: check_time
        run: |
          echo "Europe/Stockholm now: $(TZ='Europe/Stockholm' date)"
          hour=$(TZ='Europe/Stockholm' date +'%H')
          minute=$(TZ='Europe/Stockholm' date +'%M')
          echo "Local hour: $hour, minute: $minute"
          if [ "$hour" = "20" ] && [ "$minute" = "30" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
            echo "It's 20:30 — proceeding with task."
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Not 20:30 Europe/Stockholm; skipping task."
          fi

      - name: Run DB migrations
        if: steps.check_time.outputs.run == 'true'
        run: bundle exec rails db:migrate

      - name: Run daily lunar mail task
        if: steps.check_time.outputs.run == 'true'
        run: bundle exec rails cron:daily_lunar_email
